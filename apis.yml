aid: vimeo-ott
url: https://raw.githubusercontent.com/api-evangelist/vimeo-ott/refs/heads/main/apis.yml
name: Vimeo OTT
kind: company
description: Vimeo OTT (formerly VHX) is a subscription video / over-the-top (OTT)
  platform for launching branded SVOD, TVOD, and live streaming services across web,
  mobile, and connected-TV apps. Its documented REST API at api.vhx.tv lets media
  companies programmatically manage customers, products (subscription, rental, and
  purchase access agreements), videos, and collections (categories, series, seasons,
  movies, playlists), plus watchlists, player authorizations, comments, live events,
  and analytics. The API is publicly documented at dev.vhx.tv and uses HTTP Basic
  authentication with an API key generated from the Vimeo OTT CMS; the platform
  itself is a paid product (Starter and Enterprise plans).
