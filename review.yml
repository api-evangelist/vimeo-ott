aid: vimeo-ott
name: Vimeo OTT
review:
  question: Does Vimeo OTT expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. The Vimeo OTT (VHX) public API at
    api.vhx.tv is request/response REST over HTTPS with JSON (HAL) responses.
    There is no documented server-push transport (WebSocket or SSE) on Vimeo
    OTT's own management API to model. Real-time video delivery to end users is
    handled by the Vimeo OTT adaptive-streaming player over HLS/DASH, which is a
    media-delivery transport rather than an application API surface, and is out
    of scope for an AsyncAPI document.
findings:
  summary: |
    Vimeo OTT (formerly VHX) does not publish a documented public WebSocket API.
    The public developer API at https://api.vhx.tv is a pure request/response
    REST API over HTTPS. It is documented openly at dev.vhx.tv and authenticated
    with HTTP Basic Auth (API key as username, blank password); API keys are
    generated on the Platforms page of the Vimeo OTT CMS. Responses are JSON
    using the HAL hypermedia convention (_links, _embedded). Resources include
    customers, products, videos, collections, watchlists, authorizations,
    comments, live events, and analytics. No realtime, bidirectional, or
    streaming WebSocket (ws:// or wss://) endpoint is documented on Vimeo OTT's
    own API. Video playback itself is delivered by the OTT player via adaptive
    HTTP streaming (HLS/DASH), not a WebSocket API.
  accessModel: |
    The API reference is publicly readable, but useful API access is gated
    behind a paid Vimeo OTT account (Starter or Enterprise plan). There is no
    free, standalone, self-serve API product - the API manages an OTT service
    you operate on the platform. API keys are issued from within the OTT CMS.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.vhx.tv
      documented: true
      note: All documented Vimeo OTT (VHX) API resources are HTTPS REST with JSON (HAL) responses.
    - protocol: HLS/DASH
      scheme: https
      documented: true
      note: End-user video playback is adaptive HTTP streaming via the OTT player, not an application API. Out of AsyncAPI scope.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Vimeo OTT / VHX API reference as of the review date.
