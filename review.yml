actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Vimeo OTT's own public API is
    request/response REST (api.vhx.tv) with JSON/HAL responses. No AsyncAPI
    document was created because there is no server-push transport (WebSocket or
    SSE) on Vimeo OTT's own API to model; video delivery to end users happens
    via the OTT player's adaptive HTTP streaming, which carries its own media
    transport and is out of scope.
