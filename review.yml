    Request and response bodies (field-level schemas) in the bundled OpenAPI and
    collection artifacts are modeled from the documented examples. HTTP methods
    and paths above are confirmed from the live public reference at dev.vhx.tv.
sources:
  - url: https://dev.vhx.tv/
    type: Documentation
    note: Vimeo OTT (VHX) developer landing page.
  - url: https://dev.vhx.tv/docs/api/
    type: APIReference
    note: Full REST API reference; base https://api.vhx.tv, HTTP Basic Auth with API key, JSON/HAL. No WebSocket documented.
  - url: https://dev.vhx.tv/api/
    type: Documentation
    note: API overview and tutorials; API keys created on the CMS Platforms page.
  - url: https://dev.vhx.tv/player/
