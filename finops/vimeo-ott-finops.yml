meters:
- name: active_subscribers
  description: Active subscribers billed at $1 per subscriber per month on the Starter plan.
  unit: subscribers
  aggregation: sum
  dimensions:
  - account
  - product
- name: transaction_fees
  description: Service fee on one-time (TVOD) purchases - 10% of each purchase on Starter.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - product
- name: bandwidth
  description: Media-delivery bandwidth consumed; included up to a plan allowance (e.g. 60TB/month on Enterprise), with overage beyond it.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
- name: upload_hours
  description: Content ingest / upload hours; included up to a plan allowance (e.g. 200 hours/month on Enterprise).
  unit: hours
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track active subscribers, transaction volume, bandwidth, and upload hours per product so spend maps to the revenue it supports.
- name: Allocation
  description: Name products and collections per title or content line so per-subscriber and transaction fees map to internal cost centers.
- name: Optimization
  description: On Starter, cost scales with subscribers and transactions, so churn reduction and pricing are the levers; on Enterprise, negotiate volume discounts and right-size bandwidth and upload allowances to avoid overage.
- name: Accountability
  description: Assign an owner to each OTT service; review monthly subscriber, transaction, and bandwidth figures against the plan agreement.
