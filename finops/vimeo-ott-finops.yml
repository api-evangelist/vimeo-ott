description: >-
  FinOps view of Vimeo OTT (formerly VHX) spend. The REST API at api.vhx.tv is a
  management surface bundled with a paid Vimeo OTT account and carries no separate
  per-call fee, so API cost is not the primary spend driver. Spend is driven by the
  OTT plan model. On Starter (web-only) there is no upfront platform fee - Vimeo
  takes a $1 per-subscriber monthly fee plus a 10% service fee on one-time (TVOD)
  purchases, so cost scales directly with active subscribers and transaction
  volume. Enterprise is a custom monthly or yearly commitment with volume-based
  discounts and included bandwidth (e.g. 60TB/month) and upload hours (e.g. 200/month);
  overage on bandwidth and ingest, plus payment-processing fees where Vimeo
  processes payments, are the variable components.
notes: >-
  Per-unit rates confirmed from vimeo.com/ott/pricing are $1/subscriber/month and
  10% on one-time purchases (Starter). Enterprise is custom-quoted. Third-party
  sources cite an additional payment-processing fee (about 2.5% + $0.30 per
  transaction) when Vimeo processes payment; this is not on the official pricing
  page and is flagged as unconfirmed. Reconcile with a current Vimeo quote.
